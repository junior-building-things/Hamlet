name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # Every LLM call shells out to the `claude` CLI baked into the image
      # (see Dockerfile), so the service needs:
      #   - CLAUDE_CODE_OAUTH_TOKEN from Secret Manager. Never set
      #     ANTHROPIC_API_KEY: that switches the CLI to per-token API
      #     billing instead of the subscription.
      #   - Headroom for the CLI subprocesses. Each `claude -p` is its own
      #     Node process and lib/llm.ts runs up to CLAUDE_CONCURRENCY (3)
      #     of them at once, which does not fit the old 512Mi/1cpu.
      # --remove-env-vars drops the now-unused Gemini key; it is a no-op
      # once the variable is gone.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hamlet \
            --source . \
            --region asia-southeast1 \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --update-secrets CLAUDE_CODE_OAUTH_TOKEN=claude-code-oauth-token:latest \
            --remove-env-vars GOOGLE_AI_API_KEY \
            --quiet

      # The batch digest pipeline runs as a Cloud Run Job, not on the
      # service: a full pass takes 10-26 min, which does not fit Cloud
      # Scheduler's 30-min HTTP ceiling (let alone the routes' 600s
      # maxDuration). Jobs have no such limit.
      #
      # Env is mirrored from the service rather than duplicated here, so
      # the two can never drift. It goes via --env-vars-file so secret
      # values never appear in a command line or CI log.
      - name: Build and deploy digest Job
        run: |
          set -euo pipefail
          IMAGE="asia-southeast1-docker.pkg.dev/tiktok-im/cloud-run-source-deploy/hamlet-digests:${{ github.sha }}"

          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet
          docker build -f Dockerfile.job -t "$IMAGE" .
          docker push "$IMAGE"

          gcloud run services describe hamlet --region asia-southeast1 --format=json \
            | jq -r '.spec.template.spec.containers[0].env
                     | map(select(.value != null))
                     | .[] | "\(.name): \(.value | @json)"' > job-env.yaml
          echo "mirrored $(wc -l < job-env.yaml) env vars from the service"

          gcloud run jobs deploy hamlet-digests \
            --image "$IMAGE" \
            --region asia-southeast1 \
            --cpu 2 \
            --memory 2Gi \
            --task-timeout 3600s \
            --max-retries 0 \
            --env-vars-file job-env.yaml \
            --set-secrets CLAUDE_CODE_OAUTH_TOKEN=claude-code-oauth-token:latest \
            --quiet

          rm -f job-env.yaml
